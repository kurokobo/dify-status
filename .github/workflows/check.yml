name: Run Status Checks

on:
  # Triggered every 15 minutes by cron-job.org (schedule: */15 * * * *)
  workflow_dispatch:

concurrency:
  group: status-check
  cancel-in-progress: false

jobs:
  check:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - uses: astral-sh/setup-uv@cec208311dfd045dd5311c1add060b2062131d57  # v8.0.0
        with:
          version: "0.11.3"

      - name: Run checks
        env:
          DIFY_API_KEY: ${{ secrets.DIFY_API_KEY }}
          DIFY_SANDBOX_API_KEY: ${{ secrets.DIFY_SANDBOX_API_KEY }}
          DIFY_PLUGIN_API_KEY: ${{ secrets.DIFY_PLUGIN_API_KEY }}
          DIFY_INDEXING_FREE_DATASET_ID_1: ${{ secrets.DIFY_INDEXING_FREE_DATASET_ID_1 }}
          DIFY_INDEXING_FREE_API_KEY_1: ${{ secrets.DIFY_INDEXING_FREE_API_KEY_1 }}
          DIFY_INDEXING_FREE_DATASET_ID_2: ${{ secrets.DIFY_INDEXING_FREE_DATASET_ID_2 }}
          DIFY_INDEXING_FREE_API_KEY_2: ${{ secrets.DIFY_INDEXING_FREE_API_KEY_2 }}
          DIFY_INDEXING_PRO_DATASET_ID: ${{ secrets.DIFY_INDEXING_PRO_DATASET_ID }}
          DIFY_INDEXING_PRO_API_KEY: ${{ secrets.DIFY_INDEXING_PRO_API_KEY }}
          DIFY_RETRIEVE_DATASET_ID: ${{ secrets.DIFY_RETRIEVE_DATASET_ID }}
          DIFY_RETRIEVE_API_KEY: ${{ secrets.DIFY_RETRIEVE_API_KEY }}
          DIFY_WEBHOOK_FREE_TRIGGER_TOKEN_1: ${{ secrets.DIFY_WEBHOOK_FREE_TRIGGER_TOKEN_1 }}
          DIFY_WEBHOOK_FREE_API_KEY_1: ${{ secrets.DIFY_WEBHOOK_FREE_API_KEY_1 }}
          DIFY_WEBHOOK_FREE_TRIGGER_TOKEN_2: ${{ secrets.DIFY_WEBHOOK_FREE_TRIGGER_TOKEN_2 }}
          DIFY_WEBHOOK_FREE_API_KEY_2: ${{ secrets.DIFY_WEBHOOK_FREE_API_KEY_2 }}
          DIFY_WEBHOOK_PRO_TRIGGER_TOKEN: ${{ secrets.DIFY_WEBHOOK_PRO_TRIGGER_TOKEN }}
          DIFY_WEBHOOK_PRO_API_KEY: ${{ secrets.DIFY_WEBHOOK_PRO_API_KEY }}
        run: uv run --frozen python -m checks.runner

      - name: Cleanup old data
        run: uv run --frozen python -m build.cleanup

      - name: Notify on status changes
        env:
          GH_TOKEN: ${{ github.token }}
        run: uv run --frozen python -m checks.notify

      - name: Commit and push results
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/
          if git diff --cached --quiet; then
            echo "No changes to commit"
            exit 0
          fi
          git commit -m "Update status data"
          for i in 1 2 3; do
            git pull --rebase origin main && git push origin main && break
            echo "Retry $i..."
            sleep 5
          done

  build:
    needs: check
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pages: write
      id-token: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          ref: main

      - uses: astral-sh/setup-uv@cec208311dfd045dd5311c1add060b2062131d57  # v8.0.0
        with:
          version: "0.11.3"

      - name: Build site
        run: uv run --frozen python -m build.build

      - uses: actions/upload-pages-artifact@7b1f4a764d45c48632c6b24a0339c27f5614fb0b  # v4.0.0
        with:
          path: site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@cd2ce8fcbc39b97be8ca5fce6e763baed58fa128  # v5.0.0
