{# OGP image template — 7-day x 24-hour overall status grid (mirrors frontend 7D view) #}
{% set cell_size = 38 %}
{% set cell_gap = 4 %}
{% set cell_pitch = cell_size + cell_gap %}
{% set num_cols = 24 %}
{% set num_rows = days | length %}
{% set grid_width = num_cols * cell_pitch - cell_gap %}
{% set grid_height = num_rows * cell_pitch - cell_gap %}
{% set label_width = 80 %}
{% set grid_x = ((1200 - label_width - 8 - grid_width) / 2 + label_width + 8) | int %}
{% set label_x = grid_x - 8 %}
{% set grid_y = 240 %}
{% set colors = {"up": "#2da44e", "degraded": "#d4a017", "down": "#cf222e", "nodata": "#d0d7de"} %}
{% set font = "system-ui, -apple-system, 'Segoe UI', Arial, sans-serif" %}
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <!-- Background -->
  <rect width="1200" height="630" fill="#f5f5f5"/>

  <!-- Top accent line -->
  <rect x="0" y="0" width="1200" height="6" fill="#0033ff"/>

  <!-- Title -->
  <text x="600" y="130" text-anchor="middle" font-family="{{ font }}" font-size="64" font-weight="800" fill="#0033ff" letter-spacing="-1">{{ site_title | e }}</text>

  <!-- Section label -->
  <text x="600" y="185" text-anchor="middle" font-family="{{ font }}" font-size="22" font-weight="600" fill="#1f2328">Overall status for cloud.dify.ai — Last {{ num_rows }} days (UTC)</text>

  <!-- Day rows -->
  {% for day in days %}
  {% set row_y = grid_y + loop.index0 * cell_pitch %}
  {% set text_y = (row_y + cell_size / 2 + 6) | int %}
  <text x="{{ label_x }}" y="{{ text_y }}" text-anchor="end" font-family="{{ font }}" font-size="16" font-weight="500" fill="#656d76">{{ day.label }}</text>
  {% for h in day.hours %}
  {% set col_x = grid_x + loop.index0 * cell_pitch %}
  <rect x="{{ col_x }}" y="{{ row_y }}" width="{{ cell_size }}" height="{{ cell_size }}" rx="4" fill="{{ colors[h.status] }}"/>
  {% endfor %}
  {% endfor %}

  <!-- Hour labels below grid -->
  {% set hour_label_y = grid_y + num_rows * cell_pitch + 20 %}
  {% for h in [0, 6, 12, 18, 23] %}
  {% set hx = grid_x + h * cell_pitch + cell_size / 2 %}
  <text x="{{ hx }}" y="{{ hour_label_y }}" text-anchor="middle" font-family="{{ font }}" font-size="14" fill="#8b949e">{{ h }}:00</text>
  {% endfor %}

  <!-- Bottom accent line -->
  <rect x="0" y="624" width="1200" height="6" fill="#0033ff"/>
</svg>
